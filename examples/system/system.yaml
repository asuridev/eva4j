system:
  name: product-catalog
  groupId: com.example
  javaVersion: 21
  springBootVersion: 3.5.5
  database: postgresql

messaging:
  enabled: true
  broker: kafka
  kafka:
    bootstrapServers: localhost:9092
    defaultGroupId: product-catalog
    topicPrefix: catalog

modules:

  # ─────────────────────────────────────────────
  # CATÁLOGO DE PRODUCTOS
  # ─────────────────────────────────────────────

  - name: product
    description: "Catálogo de productos y categorías. Gestiona el ciclo de vida de un producto (DRAFT → PUBLISHED → DISCONTINUED). Dos agregados: Product y Category."
    exposes:
      # ── Product ───────────────────────────────
      - method: POST
        path: /products
        useCase: CreateProduct
        description: "Crear nuevo producto en estado DRAFT"
      - method: GET
        path: /products/{id}
        useCase: GetProduct
        description: "Obtener detalle de un producto"
      - method: GET
        path: /products
        useCase: FindAllProducts
        description: "Listar productos con paginación"
      - method: PUT
        path: /products/{id}
        useCase: UpdateProduct
        description: "Actualizar datos de un producto en estado DRAFT"
      - method: PUT
        path: /products/{id}/publish
        useCase: PublishProduct
        description: "Publicar un producto: DRAFT → PUBLISHED. Emite ProductPublishedEvent."
      - method: PUT
        path: /products/{id}/discontinue
        useCase: DiscontinueProduct
        description: "Discontinuar un producto: PUBLISHED/DRAFT → DISCONTINUED"
      # ── Category ──────────────────────────────
      - method: POST
        path: /categories
        useCase: CreateCategory
        description: "Crear nueva categoría de productos"
      - method: GET
        path: /categories/{id}
        useCase: GetCategory
        description: "Obtener detalle de una categoría"
      - method: GET
        path: /categories
        useCase: FindAllCategorys
        description: "Listar categorías con paginación"
      - method: PUT
        path: /categories/{id}
        useCase: UpdateCategory
        description: "Actualizar nombre/descripción de una categoría"

  # ─────────────────────────────────────────────
  # NOTIFICACIONES
  # ─────────────────────────────────────────────

  - name: notification
    description: "Despacha notificaciones a usuarios por EMAIL, SMS o PUSH. Reacciona a eventos del dominio product para informar a usuarios interesados."
    exposes:
      - method: POST
        path: /notifications
        useCase: CreateNotification
        description: "Crear y encolar una notificación manualmente"
      - method: GET
        path: /notifications/{id}
        useCase: GetNotification
        description: "Obtener estado de una notificación"
      - method: GET
        path: /notifications
        useCase: FindAllNotifications
        description: "Listar notificaciones con paginación"
      - method: DELETE
        path: /notifications/{id}
        useCase: DeleteNotification
        description: "Eliminar lógicamente una notificación (soft delete)"
      - method: PUT
        path: /notifications/{id}/read
        useCase: MarkNotificationRead
        description: "Marcar notificación como leída"

  # ─────────────────────────────────────────────
  # CLIENTES
  # ─────────────────────────────────────────────

  - name: customer
    description: "Gestión de clientes. Emite lifecycle events para que otros módulos mantengan proyecciones locales."
    exposes:
      - method: POST
        path: /customers
        useCase: CreateCustomer
        description: "Registrar un nuevo cliente"
      - method: GET
        path: /customers/{id}
        useCase: GetCustomer
        description: "Obtener detalle de un cliente"
      - method: GET
        path: /customers
        useCase: FindAllCustomers
        description: "Listar clientes con paginación"
      - method: PUT
        path: /customers/{id}
        useCase: UpdateCustomer
        description: "Actualizar datos de un cliente"
      - method: DELETE
        path: /customers/{id}
        useCase: DeleteCustomer
        description: "Eliminar un cliente"

  # ─────────────────────────────────────────────
  # ÓRDENES
  # ─────────────────────────────────────────────

  - name: orders
    description: "Gestión de órdenes de compra. Mantiene readModels locales de Product y Customer para evitar llamadas HTTP síncronas."
    exposes:
      - method: POST
        path: /orders
        useCase: CreateOrder
        description: "Crear una nueva orden"
      - method: GET
        path: /orders/{id}
        useCase: GetOrder
        description: "Obtener detalle de una orden"
      - method: GET
        path: /orders
        useCase: FindAllOrders
        description: "Listar órdenes con paginación"
      - method: PUT
        path: /orders/{id}
        useCase: UpdateOrder
        description: "Actualizar una orden"
      - method: DELETE
        path: /orders/{id}
        useCase: DeleteOrder
        description: "Eliminar una orden"

integrations:
  async:
    # Producto publicado → notification envía alerta a usuarios suscritos
    - event: ProductPublishedEvent
      producer: product
      topic: PRODUCT_PUBLISHED
      consumers:
        - module: notification
          useCase: SendProductPublishedNotification

    # Producto discontinuado → notification informa aos usuarios
    - event: ProductDiscontinuedEvent
      producer: product
      topic: PRODUCT_DISCONTINUED
      consumers:
        - module: notification
          useCase: SendProductDiscontinuedNotification

    # ── Lifecycle events para readModels ──────────────────────────────────

    # Product lifecycle → orders mantiene ProductReadModel
    - event: ProductCreatedEvent
      producer: product
      topic: PRODUCT_CREATED

    - event: ProductUpdatedEvent
      producer: product
      topic: PRODUCT_UPDATED

    # Customer lifecycle → orders mantiene CustomerReadModel
    - event: CustomerCreatedEvent
      producer: customer
      topic: CUSTOMER_CREATED

    - event: CustomerUpdatedEvent
      producer: customer
      topic: CUSTOMER_UPDATED

    - event: CustomerDeletedEvent
      producer: customer
      topic: CUSTOMER_DELETED
