# =============================================================================
# PROTOTYPE: customers.yaml — versión Temporal (sin Kafka)
# =============================================================================

aggregates:
  - name: Customer
    entities:
      - name: customer
        isRoot: true
        tableName: customers
        audit:
          enabled: true
        fields:
          - name: id
            type: String
          - name: firstName
            type: String
            validations:
              - type: NotBlank
                message: "First name is required"
          - name: lastName
            type: String
            validations:
              - type: NotBlank
                message: "Last name is required"
          - name: email
            type: String
            validations:
              - type: NotBlank
                message: "Email is required"
              - type: Email
                message: "Invalid email format"
          - name: phone
            type: String
            validations:
              - type: NotBlank
                message: "Phone number is required"
          - name: address
            type: Address

    valueObjects:
      - name: Address
        fields:
          - name: street
            type: String
          - name: city
            type: String
          - name: department
            type: String
          - name: zipCode
            type: String
          - name: neighborhood
            type: String
        methods:
          - name: format
            returnType: String
            parameters: []
            body: "return street + \", \" + neighborhood + \", \" + city + \" (\" + department + \") \" + zipCode;"

    events:
      - name: CustomerCreatedEvent
        lifecycle: create
        fields:
          - name: customerId
            type: String
          - name: firstName
            type: String
          - name: lastName
            type: String
          - name: email
            type: String
          - name: phone
            type: String
        # SIN notifies → Domain Event interno.
        # Sin read models, no hay workflows de sincronización.
        # Los workflows que necesitan datos de cliente los obtienen
        # on-demand via GetCustomerById (Remote Activity).

      - name: CustomerUpdatedEvent
        lifecycle: update
        fields:
          - name: customerId
            type: String
          - name: firstName
            type: String
          - name: lastName
            type: String
          - name: email
            type: String
          - name: phone
            type: String
        # SIN notifies → Domain Event interno.

# ─── Activities que este módulo EXPONE ───────────────────────────────────────
# Activity de lectura: permite a PlaceOrderWorkflow y CancelOrderWorkflow
# obtener datos del cliente on-demand (nombre, email para notificaciones).
activities:
  - name: GetCustomerById
    type: light
    description: "Obtiene un cliente por su ID"
    input:
      - name: customerId
        type: String
    output:
      - name: customerId
        type: String
      - name: firstName
        type: String
      - name: lastName
        type: String
      - name: email
        type: String
      - name: phone
        type: String
    timeout: 5s

endpoints:
  basePath: /customers
  versions:
    - version: v1
      operations:
        - useCase: GetCustomer
          method: GET
          path: /{id}
        - useCase: FindAllCustomers
          method: GET
          path: /
        - useCase: CreateCustomer
          method: POST
          path: /
        - useCase: UpdateCustomer
          method: PUT
          path: /{id}
